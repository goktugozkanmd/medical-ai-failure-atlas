# MedFailBench Model Registry
# 
# Registered models for automated eval pipeline.
# Add new models here → eval-pipeline picks them up automatically.
#
# Fields:
#   id:         Unique identifier (used in filenames and CI matrix)
#   name:       Display name for leaderboard
#   provider:   API provider (openrouter | hf | openai | anthropic)
#   model:      Model string passed to the API
#   active:     true = included in scheduled runs, false = archived
#   tier:       core | extended | experimental
#   notes:      Optional context

models:
  - id: qwen-3.7-max
    name: Qwen 3.7 Max
    provider: openrouter
    model: qwen/qwen-3.7-max
    active: true
    tier: core
    notes: Chinese frontier, large eval set (30 prompts)

  - id: qwen-3.6-plus
    name: Qwen 3.6 Plus
    provider: openrouter
    model: qwen/qwen-3.6-plus
    active: true
    tier: core
    notes: Chinese frontier, large eval set (30 prompts)

