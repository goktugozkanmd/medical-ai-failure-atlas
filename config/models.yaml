  - id: deepseek-v4-flash
    name: DeepSeek V4 Flash
    provider: openrouter
    model: deepseek/deepseek-v4-flash
    active: true
    tier: extended
    notes: Smaller eval set (5 prompts)

  - id: deepseek-v3.2
    name: DeepSeek V3.2
    provider: openrouter
