schedules:
  weekly:
    # Models to run on Monday 05:00 UTC schedule
    - qwen-3.7-max
    - qwen-3.6-plus
    - glm-5.2
    - deepseek-v4-pro
  biweekly:
    # Models to run every 2 weeks
    - kimi-k2.6
    - kimi-k2.7-code
  monthly:
    # Models to run every 4 weeks
    - deepseek-v4-flash
    - deepseek-v3.2
    - qwen-2.5-7b-instruct
    - llama-3.1-8b-instruct