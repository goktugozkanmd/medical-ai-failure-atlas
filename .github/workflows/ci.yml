name: CI

# Continuous integration for the medical-ai-failure-atlas release tree.
# Mirrors what STATE_LEDGER.md claims ("pytest + validate-public + secret-scan")
# but actually runs it on every push/PR instead of relying on local runs.
#
# Notes:
# - validate target in Makefile chains ~50 validator scripts. We run them via
#   `make validate-public` on Linux runners (make is available there).
# - pytest is NOT wired into the Makefile today; we invoke it directly.
# - secret-scan uses gitleaks via the official action.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday 03:00 UTC (weekly real eval)
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest>=8

      - name: Run pytest
        run: python -m pytest -v

  validate-public:
    name: make validate-public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        # No pip cache here: validate-public uses only the stdlib + repo
        # scripts, no dependencies are installed. Caching pip with nothing
        # to cache makes setup-python error out in the post step.

      - name: Run validate-public
        run: make PYTHON=python validate-public

  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  preprint:
    name: build preprint (tectonic)
    runs-on: ubuntu-latest
    # Verify the arXiv-bound LaTeX compiles on every change. Catches preamble
    # breakage, missing figures, and undefined references before submission.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check citation integrity
        run: |
          python - <<'PY'
          import re
          tex = open('preprint/main.tex', encoding='utf-8').read()
          bib = open('preprint/references.bib', encoding='utf-8').read()
          cited = {k.strip() for m in re.finditer(r'\\cite\{([^}]+)\}', tex) for k in m.group(1).split(',')}
          defined = set(re.findall(r'@\w+\{([^,\s]+)', bib))
          missing = cited - defined
          if missing:
              raise SystemExit(f'FAIL: {len(missing)} citation(s) missing from references.bib: {sorted(missing)}')
          print(f'OK: {len(cited)} citations all defined in references.bib')
          PY

      - name: Build PDF with tectonic
        uses: VincentDnl/tectonic-action@v1.0.2
        with:
          working_directory: preprint
          file: main.tex

      - name: Verify PDF produced
        run: |
          test -f preprint/main.pdf || { echo "FAIL: main.pdf not produced"; exit 1; }
          echo "OK: preprint/main.pdf built ($(stat -c%s preprint/main.pdf) bytes)"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprint-pdf
          path: preprint/main.pdf
          retention-days: 30


  # Weekly real (non-DRY-RUN) model eval. Runs only if HF_TOKEN secret is set;
  # otherwise skips gracefully so the workflow never goes red for a missing
  # credential. Replaces the silent DRY-RUN pattern that produced simulated
  # leaderboard scores.
  weekly-eval:
    name: weekly real eval (HF)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run real eval (Qwen 2.5-7B via HF router)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set — skipping real eval (add the secret to enable)."
            exit 0
          fi
          # Single HF-backed model. Other Chinese-frontier models need
          # OPENROUTER_API_KEY; add that secret to extend coverage.
          python scripts/weekly_model_eval.py --model qwen-2.5-7b-instruct

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-eval-results
          path: model_runs/
          retention-days: 30

